---
- name: Deploy the stack
  hosts: localhost
  tasks:

  # This will wait indefinitely if cloud-provider-kind is not running

  # Attempt picking up the external IP of the Edge Gateway for 10 times, waiting 5 seconds between attempts
  - name: Collect information about the Edge Gateway
    kubernetes.core.k8s_info:
      api_version: gateway.networking.k8s.io/v1
      kind: Gateway
      name: "{{ cluster.edge.name }}"
      namespace: "{{ cluster.edge.ns }}"
    register: edge_gateway
    until: edge_gateway.resources[0].status.addresses[0].value is defined
    retries: 10
    delay: 5

  - name: Do not continue if we do not have an Edge Gateway IP address at this point
    when: edge_gateway.resources[0].status.addresses[0].value is not defined
    ansible.builtin.fail:
      msg: "Could not determine the external IP address of the Edge Gateway. Have you started cloud-provider-kind?"

  - name: Deploy Prometheus
    when: "stack.prometheus.enabled | bool == true"
    block:
    - name: Create and label the Prometheus namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ stack.prometheus.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
        waypoint: wp-prometheus
    - name: Deploy the Prometheus Helm Chart
      kubernetes.core.helm:
        name: prometheus
        create_namespace: false
        release_namespace: "{{ stack.prometheus.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ host.dns.zone }}:{{ host.registry.host_port | int }}/kube-eng/kube-eng-prometheus"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
            edge:
              kind: "{{ cluster.edge.kind }}"
              fqdn: "{{ stack.prometheus.hostname }}.{{ host.dns.zone }}"
              gateway:
                name: "{{ cluster.edge.name }}"
                ns: "{{ cluster.edge.ns }}"
          prometheus:
            prometheus:
              prometheusSpec:
                externalLabels:
                  origin_prometheus: "{{ cluster.name }}"
    - name: Update DNS with a record for Prometheus
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ stack.prometheus.hostname }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ edge_gateway.resources[0].status.addresses[0].value }}"
        type: A
        state: present

  - name: Deploy Grafana
    when: "stack.grafana.enabled | bool == true"
    block:
    - name: Create and label the Grafana namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ stack.grafana.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
        waypoint: wp-grafana
    - name: Register Grafana in Keycloak
      community.general.keycloak_client:
        auth_keycloak_url: "https://{{ host.idp.name }}.{{ host.dns.zone }}:{{ host.idp.host_port }}"
        auth_realm: master
        auth_username: admin
        auth_password: "{{ admin_password }}"
        client_id: "{{ stack.grafana.client_id }}"
        name: "{{ stack.grafana.client_id }}"
        description: "Kube Eng :: Grafana"
        enabled: true
        protocol: openid-connect
        public_client: false
        client_authenticator_type: client-secret
        secret: "{{ admin_password }}"
        root_url: "https://{{ stack.grafana.hostname }}.{{ host.dns.zone }}/"
        base_url: "https://{{ stack.grafana.hostname }}.{{ host.dns.zone }}/"
        admin_url: "https://{{ stack.grafana.hostname }}.{{ host.dns.zone }}/"
        redirect_uris:
        - "https://{{ stack.grafana.hostname }}.{{ host.dns.zone }}/login/generic_oauth"
        standard_flow_enabled: true
        implicit_flow_enabled: false
        direct_access_grants_enabled: true
        default_client_scopes:
        - email
        - offline_access
        - profile
        - roles
        validate_certs: true
    - name: Register Grafana Viewer role
      community.general.keycloak_role:
        auth_keycloak_url: "https://{{ host.idp.name }}.{{ host.dns.zone }}:{{ host.idp.host_port }}"
        auth_realm: master
        auth_username: admin
        auth_password: "{{ admin_password }}"
        name: Viewer
        description: Grafana Viewers
        client_id: "{{ stack.grafana.client_id }}"
        state: present
        validate_certs: true
    - name: Register Grafana Editor role
      community.general.keycloak_role:
        auth_keycloak_url: "https://{{ host.idp.name }}.{{ host.dns.zone }}:{{ host.idp.host_port }}"
        auth_realm: master
        auth_username: admin
        auth_password: "{{ admin_password }}"
        name: Editor
        description: Grafana Editors
        client_id: "{{ stack.grafana.client_id }}"
        state: present
        validate_certs: true
    - name: Register Grafana Admin role
      community.general.keycloak_role:
        auth_keycloak_url: "https://{{ host.idp.name }}.{{ host.dns.zone }}:{{ host.idp.host_port }}"
        auth_realm: master
        auth_username: admin
        auth_password: "{{ admin_password }}"
        name: Admin
        description: Grafana Admins
        client_id: "{{ stack.grafana.client_id }}"
        state: present
        validate_certs: true
    - name: Install Grafana
      kubernetes.core.helm:
        name: grafana
        create_namespace: false
        release_namespace: "{{ stack.grafana.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ host.dns.zone }}:{{ host.registry.host_port | int }}/kube-eng/kube-eng-grafana"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
            edge:
              kind: "{{ cluster.edge.kind }}"
              fqdn: "{{ stack.grafana.hostname }}.{{ host.dns.zone }}"
              gateway:
                name: "{{ cluster.edge.name }}"
                ns: "{{ cluster.edge.ns }}"
          integration:
            adminUser: "{{ stack.grafana.admin_user }}"
            adminPassword: "{{ admin_password }}"
            rootUrl: "https://{{ stack.grafana.hostname }}.{{ host.dns.zone }}/"
            oauth:
              clientId: "{{ stack.grafana.client_id }}"
              clientSecret: "{{ admin_password }}"
              authUrl: "https://{{ host.idp.name }}.{{ host.dns.zone }}:{{ host.idp.host_port }}/realms/master/protocol/openid-connect/auth"
              tokenUrl: "https://{{ host.idp.name }}.{{ host.dns.zone }}:{{ host.idp.host_port }}/realms/master/protocol/openid-connect/token"
              apiUrl: "https://{{ host.idp.name }}.{{ host.dns.zone }}:{{ host.idp.host_port }}/realms/master/protocol/openid-connect/userinfo"
            prometheus:
              url: "http://prometheus-operated.{{ stack.prometheus.ns }}.svc.cluster.local:9090/"
    - name: Update DNS with a record for Grafana
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ stack.grafana.hostname }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ edge_gateway.resources[0].status.addresses[0].value }}"
        type: A
        state: present

  - name: Deploy Alloy
    when: "stack.alloy.enabled | bool == true"
    block:
    - name: Create and label the Alloy namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ stack.alloy.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
        waypoint: wp-alloy
    - name: Look up the current version of the Alloy Helm Chart
      ansible.builtin.command:
        cmd: |
          {{ host.tool.helm.path }} show chart
          --version {{ host.tool.helm.chart_version }}
          "oci://{{ host.registry.name }}.{{ host.dns.zone }}:{{ host.registry.host_port | int }}/kube-eng/kube-eng-alloy"
      register: alloy_chart_info
    - name: Deploy the Alloy Helm Chart
      kubernetes.core.helm:
        name: alloy
        create_namespace: false
        release_namespace: "{{ stack.alloy.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ host.dns.zone }}:{{ host.registry.host_port | int }}/kube-eng/kube-eng-alloy"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
            edge:
              kind: "{{ cluster.edge.kind }}"
              fqdn: "{{ stack.alloy.hostname }}.{{ host.dns.zone }}"
              gateway:
                name: "{{ cluster.edge.name }}"
                ns: "{{ cluster.edge.ns }}"
          alloy:
            controller:
              podLabels:
                app: alloy
                version: "{{ (alloy_chart_info.stdout | from_yaml).appVersion }}"
    - name: Update DNS with a record for Alloy
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ stack.alloy.hostname }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ edge_gateway.resources[0].status.addresses[0].value }}"
        type: A
        state: present

  - name: Deploy Loki
    when: "stack.loki.enabled | bool == true"
    block:
    - name: Create the loki S3 buckets
      s3_bucket:
        admin_access_key: admin
        admin_secret_key: "{{ admin_password }}"
        s3_endpoint: "https://{{ host.s3.name }}.{{ host.dns.zone }}:{{ host.s3.port }}"
        truststore_path: "{{ host.pki.ca_truststore_path }}"
        bucket_name: "{{ item }}"
        state: present
      loop:
      - loki-admin
      - loki-ruler
      - loki-chunks
    - name: Create and label the Loki namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ stack.loki.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
        waypoint: wp-loki
    - name: Look up the current version of the Loki Helm Chart
      ansible.builtin.command:
        cmd: |
          {{ host.tool.helm.path }} show chart
          --version {{ host.tool.helm.chart_version }}
          "oci://{{ host.registry.name }}.{{ host.dns.zone }}:{{ host.registry.host_port | int }}/kube-eng/kube-eng-loki"
      register: loki_chart_info
    - name: Deploy the Loki Helm chart
      kubernetes.core.helm:
        name: loki
        create_namespace: false
        release_namespace: "{{ stack.loki.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ host.dns.zone }}:{{ host.registry.host_port | int }}/kube-eng/kube-eng-loki"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
          loki:
            loki:
              podLabels:
                app: loki
                version: "{{ (loki_chart_info.stdout | from_yaml).appVersion }}"
              storage:
                s3:
                  endpoint: "https://{{ host.s3.name }}.{{ host.dns.zone }}:{{ host.s3.port }}"
                  accessKeyId: admin
                  secretAccessKey: "{{ admin_password }}"
          lokiCanary:
            podLabels:
              app: loki
              version: "{{ (loki_chart_info.stdout | from_yaml).appVersion }}"
    - name: Update DNS with a record for Loki
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ stack.loki.hostname }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ edge_gateway.resources[0].status.addresses[0].value }}"
        type: A
        state: present

  - name: Deploy Tempo
    when: "stack.tempo.enabled | bool == true"
    block:
    - name: Create the Tempo S3 buckets
      s3_bucket:
        admin_access_key: admin
        admin_secret_key: "{{ admin_password }}"
        s3_endpoint: "https://{{ host.s3.name }}.{{ host.dns.zone }}:{{ host.s3.port }}"
        truststore_path: "{{ host.pki.ca_truststore_path }}"
        bucket_name: tempo-traces
        state: present
    - name: Create and label the Tempo namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ stack.tempo.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
    - name: Create a CA trust store ConfigMap for Tempo
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: tempo-truststore
            namespace: "{{ stack.tempo.ns }}"
          data:
            truststore.pem: "{{ lookup('ansible.builtin.file', host.pki.ca_path) }}"
    - name: Deploy the Tempo Helm chart
      kubernetes.core.helm:
        name: tempo
        create_namespace: false
        release_namespace: "{{ stack.tempo.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ host.dns.zone }}:{{ host.registry.host_port | int }}/kube-eng/kube-eng-tempo"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
            edge:
              kind: "{{ cluster.edge.kind }}"
              fqdn: "{{ stack.tempo.hostname }}.{{ host.dns.zone }}"
              gateway:
                name: "{{ cluster.edge.name }}"
                ns: "{{ cluster.edge.ns }}"
          tempo:
            tempo:
              storage:
                trace:
                  backend: s3
                  s3:
                    endpoint: "{{ host.s3.name }}.{{ host.dns.zone }}:{{ host.s3.host_port }}"
                    access_key: admin
                    secret_key: "{{ admin_password }}"
                    region: us-east-1
                    insecure: false
                    tls_insecure_skip_verify: true
    - name: Update DNS with a record for Tempo
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ stack.tempo.hostname }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ edge_gateway.resources[0].status.addresses[0].value }}"
        type: A
        state: present

  - name: Deploy Kiali
    when: "stack.kiali.enabled | bool == true"
    block:
    - name: Register Kiali in Keycloak
      community.general.keycloak_client:
        auth_keycloak_url: "https://{{ host.idp.name }}.{{ host.dns.zone }}:{{ host.idp.host_port }}"
        auth_realm: master
        auth_username: admin
        auth_password: "{{ admin_password }}"
        client_id: "{{ stack.kiali.client_id }}"
        name: "{{ stack.kiali.client_id }}"
        description: "Kube Eng :: Kiali"
        enabled: true
        protocol: openid-connect
        public_client: false
        client_authenticator_type: client-secret
        secret: "{{ admin_password }}"
        root_url: "https://{{ stack.kiali.hostname }}.{{ host.dns.zone }}/"
        base_url: "https://{{ stack.kiali.hostname }}.{{ host.dns.zone }}/"
        admin_url: "https://{{ stack.kiali.hostname }}.{{ host.dns.zone }}/"
        redirect_uris:
        - "https://{{ stack.kiali.hostname }}.{{ host.dns.zone }}/*"
        standard_flow_enabled: true
        implicit_flow_enabled: false
        direct_access_grants_enabled: true
        default_client_scopes:
        - email
        - offline_access
        - profile
        - groups
        validate_certs: true
    - name: Collect information about the Kiali Service Account
      kubernetes.core.k8s_info:
        api_version: grafana.integreatly.org/v1beta1
        kind: GrafanaServiceAccount
        name: kiali-grafana-serviceaccount
        namespace: "{{ stack.grafana.ns }}"
      register: kiali_grafana_sa
    - name: Collect information about the Kiali Service Account token
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: "{{ kiali_grafana_sa.resources[0].status.account.tokens[0].secret.name }}"
        namespace: "{{ kiali_grafana_sa.resources[0].status.account.tokens[0].secret.namespace }}"
      register: kiali_grafana_sa_token
    - name: Create and label the Kiali namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ stack.kiali.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
        waypoint: wp-kiali
    - name: Create a secret for the Kiali OIDC client secret
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: kiali
            namespace: "{{ stack.kiali.ns }}"
          type: Opaque
          stringData:
            oidc-secret: "{{ admin_password }}"
        state: present
    - name: Create a CA trust store ConfigMap for Kiali
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: kiali-cabundle
            namespace: "{{ stack.kiali.ns }}"
          data:
            additional-ca-bundle.pem: "{{ lookup('ansible.builtin.file', host.pki.ca_path) }}"
    - name: Deploy the Kiali Helm Chart
      kubernetes.core.helm:
        name: kiali
        create_namespace: false
        release_namespace: "{{ stack.kiali.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ host.dns.zone }}:{{ host.registry.host_port | int }}/kube-eng/kube-eng-kiali"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
            edge:
              kind: "{{ cluster.edge.kind }}"
              fqdn: "{{ stack.kiali.hostname }}.{{ host.dns.zone }}"
              gateway:
                name: "{{ cluster.edge.name }}"
                ns: "{{ cluster.edge.ns }}"
          integration:
            keycloak:
              client_id: "{{ stack.kiali.client_id }}"
              issuer_uri: "https://{{ host.idp.name }}.{{ host.dns.zone }}:{{ host.idp.host_port }}/realms/master"
            prometheus:
              hostname: "{{ stack.prometheus.hostname }}"
              ns: "{{ stack.prometheus.ns }}"
              url: "http://prometheus-operated.{{ stack.prometheus.ns }}.svc.cluster.local:9090/"
            grafana:
              internal_url: "http://grafana-service.{{ stack.grafana.ns }}.svc.cluster.local:3000/"
              external_url: "https://{{ stack.grafana.hostname }}.{{ host.dns.zone }}/"
              auth:
                username: "{{ kiali_grafana_sa.resources[0].status.account.login }}"
                token: "{{ kiali_grafana_sa_token.resources[0].data.token | b64decode }}"
            tempo:
              internal_url: "http://tempo.{{ stack.tempo.ns }}.svc.cluster.local:3200/"
              external_url: "https://{{ stack.tempo.hostname }}.{{ host.dns.zone }}/"
              collector_url: "tempo.{{ stack.tempo.ns }}.svc.cluster.local:4317"
    - name: Update DNS with a record for Kiali
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ stack.kiali.hostname }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ edge_gateway.resources[0].status.addresses[0].value }}"
        type: A
        state: present
