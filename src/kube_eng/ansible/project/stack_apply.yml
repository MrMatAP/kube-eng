---
- name: Deploy the stack
  hosts: localhost
  tasks:

  # This will wait indefinitely if cloud-provider-kind is not running

  # Attempt picking up the external IP of the Edge Gateway for 10 times, waiting 5 seconds between attempts
  - name: Collect information about the Edge Gateway
    kubernetes.core.k8s_info:
      api_version: gateway.networking.k8s.io/v1
      kind: Gateway
      name: "{{ cluster.edge.name }}"
      namespace: "{{ cluster.edge.ns }}"
    register: edge_gateway
    until: edge_gateway.resources[0].status.addresses[0].value is defined
    retries: 10
    delay: 5

  - name: Do not continue if we do not have an Edge Gateway IP address at this point
    when: edge_gateway.resources[0].status.addresses[0].value is not defined
    ansible.builtin.fail:
      msg: "Could not determine the external IP address of the Edge Gateway. Have you started cloud-provider-kind?"

  - name: Deploy CNI UI, if enabled
    when: "cluster.cni.ui | bool == true"
    block:
    - name: Update DNS with a record for CNI
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ cluster.cni.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ edge_gateway.resources[0].status.addresses[0].value }}"
        type: A
        state: present

  - name: Deploy Prometheus
    when: "stack.prometheus.enabled | bool == true"
    block:
    - name: Create and label the Prometheus namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ stack.prometheus.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
        waypoint: "{{ cluster.mesh.kind == 'istio-ambient' }}"
    - name: Deploy the Prometheus Helm Chart
      kubernetes.core.helm:
        name: prometheus
        create_namespace: false
        release_namespace: "{{ stack.prometheus.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ cluster.name }}.{{ host.dns.zone }}:{{ host.registry.port | int }}/kube-eng/kube-eng-prometheus"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
            edge:
              kind: "{{ cluster.edge.kind }}"
              fqdn: "{{ stack.prometheus.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
              gateway:
                name: "{{ cluster.edge.name }}"
                ns: "{{ cluster.edge.ns }}"
          prometheus:
            prometheus:
              prometheusSpec:
                externalLabels:
                  origin_prometheus: "{{ cluster.name }}"
    - name: Update DNS with a record for Prometheus
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ stack.prometheus.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ edge_gateway.resources[0].status.addresses[0].value }}"
        type: A
        state: present

  - name: Deploy Keycloak
    when: "stack.keycloak.enabled | bool == true"
    block:
    - name: Create and label the Keycloak namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ stack.keycloak.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
        waypoint: "{{ cluster.mesh.kind == 'istio-ambient' }}"
    - name: Deploy the Keycloak Operator CRDs
      kubernetes.core.k8s:
        src: "{{ item }}"
        namespace: "{{ stack.keycloak.ns }}"
        apply: true
        wait: true
        state: present
      loop:
      - "{{ preheat_path }}/keycloaks.k8s.keycloak.org-v1.yml"
      - "{{ preheat_path }}/keycloakrealmimports.k8s.keycloak.org-v1.yml"
    - name: Deploy the Keycloak Operator Helm chart
      kubernetes.core.helm:
        name: kubernetes-operator
        create_namespace: false
        release_namespace: "{{ stack.keycloak.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ cluster.name }}.{{ host.dns.zone }}:{{ host.registry.port | int }}/kube-eng/kube-eng-keycloak-operator"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
            edge:
              kind: "{{ cluster.edge.kind }}"
              fqdn: "{{ stack.keycloak.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
              gateway:
                name: "{{ cluster.edge.name }}"
                ns: "{{ cluster.edge.ns }}"
    - name: Create a Keycloak user in PostgreSQL
      community.postgresql.postgresql_user:
        login_host: localhost
        login_port: "{{ host.postgresql.port | int }}"
        login_user: postgres
        login_password: "{{ admin_password }}"
        login_db: postgres
        name: keycloak
        password: "{{ admin_password }}"
        comment: "Keycloak DB User"
        state: present
      environment:
        PGOPTIONS: "-c password_encryption=scram-sha-256"
    - name: Create a database for Keycloak in PostgreSQL
      community.postgresql.postgresql_db:
        login_host: localhost
        login_port: "{{ host.postgresql.port | int }}"
        login_user: postgres
        login_password: "{{ admin_password }}"
        name: keycloak
        owner: keycloak
        comment: "Keycloak Database"
        encoding: UTF-8
        state: present
    - name: Deploy the Keycloak Helm Chart
      kubernetes.core.helm:
        name: keycloak
        create_namespace: false
        release_namespace: "{{ stack.keycloak.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ cluster.name }}.{{ host.dns.zone }}:{{ host.registry.port | int }}/kube-eng/kube-eng-keycloak"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
            edge:
              kind: "{{ cluster.edge.kind }}"
              fqdn: "{{ stack.keycloak.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
              gateway:
                name: "{{ cluster.edge.name }}"
                ns: "{{ cluster.edge.ns }}"
          keycloak:
            admin_password: "{{ admin_password }}"
            db_password: "{{ admin_password }}"
            db_host: "{{ host.postgresql.name }}.kind"
            db_port: "{{ host.postgresql.port }}"
    - name: Update DNS with a record for Keycloak
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ stack.keycloak.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ edge_gateway.resources[0].status.addresses[0].value }}"
        type: A
        state: present
    - name: Wait until the Keycloak API responds
      community.general.keycloak_realm_info:
        auth_keycloak_url: "https://{{ stack.keycloak.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
        realm: master
        # TODO: Make Ansible trust the generated PKI CA certificate
        validate_certs: false
      until: keycloak_realm_info.realm_info is defined
      retries: 10
      delay: 5
      register: keycloak_realm_info
    - name: Fail if the Keycloak API does not respond yet
      when: keycloak_realm_info.realm_info is not defined
      ansible.builtin.fail:
        msg: "Keycloak API did not respond yet. Try restarting the stack apply playbook."

  - name: Deploy Grafana
    when: "stack.grafana.enabled | bool == true"
    block:
    - name: Create and label the Grafana namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ stack.grafana.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
        waypoint: "{{ cluster.mesh.kind == 'istio-ambient' }}"
    - name: Register Grafana in Keycloak
      community.general.keycloak_client:
        auth_keycloak_url: "https://{{ stack.keycloak.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
        auth_realm: master
        auth_username: admin
        auth_password: "{{ admin_password }}"
        client_id: "{{ stack.grafana.client_id }}"
        name: "{{ stack.grafana.client_id }}"
        description: "Kube Eng :: Grafana"
        enabled: true
        protocol: openid-connect
        public_client: false
        client_authenticator_type: client-secret
        secret: "{{ admin_password }}"
        root_url: "https://{{ stack.grafana.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}/"
        base_url: "https://{{ stack.grafana.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}/"
        admin_url: "https://{{ stack.grafana.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}/"
        redirect_uris:
        - "https://{{ stack.grafana.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}/login/generic_oauth"
        standard_flow_enabled: true
        implicit_flow_enabled: false
        direct_access_grants_enabled: true
        default_client_scopes:
        - email
        - offline_access
        - profile
        - roles
        # TODO: Make Ansible trust the generated PKI CA certificate
        validate_certs: false
    - name: Register Grafana Viewer role
      community.general.keycloak_role:
        auth_keycloak_url: "https://{{ stack.keycloak.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
        auth_realm: master
        auth_username: admin
        auth_password: "{{ admin_password }}"
        name: Viewer
        description: Grafana Viewers
        client_id: "{{ stack.grafana.client_id }}"
        state: present
        # TODO: Make Ansible trust the generated PKI CA certificate
        validate_certs: false
    - name: Register Grafana Editor role
      community.general.keycloak_role:
        auth_keycloak_url: "https://{{ stack.keycloak.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
        auth_realm: master
        auth_username: admin
        auth_password: "{{ admin_password }}"
        name: Editor
        description: Grafana Editors
        client_id: "{{ stack.grafana.client_id }}"
        state: present
        # TODO: Make Ansible trust the generated PKI CA certificate
        validate_certs: false
    - name: Register Grafana Admin role
      community.general.keycloak_role:
        auth_keycloak_url: "https://{{ stack.keycloak.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
        auth_realm: master
        auth_username: admin
        auth_password: "{{ admin_password }}"
        name: Admin
        description: Grafana Admins
        client_id: "{{ stack.grafana.client_id }}"
        state: present
        # TODO: Make Ansible trust the generated PKI CA certificate
        validate_certs: false
    - name: Install Grafana
      kubernetes.core.helm:
        name: grafana
        create_namespace: false
        release_namespace: "{{ stack.grafana.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ cluster.name }}.{{ host.dns.zone }}:{{ host.registry.port | int }}/kube-eng/kube-eng-grafana"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
            edge:
              kind: "{{ cluster.edge.kind }}"
              fqdn: "{{ stack.grafana.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
              gateway:
                name: "{{ cluster.edge.name }}"
                ns: "{{ cluster.edge.ns }}"
          integration:
            adminUser: "{{ stack.grafana.admin_user }}"
            adminPassword: "{{ admin_password }}"
            rootUrl: "https://{{ stack.grafana.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}/"
            oauth:
              clientId: "{{ stack.grafana.client_id }}"
              clientSecret: "{{ admin_password }}"
              authUrl: "https://{{ stack.keycloak.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}/realms/master/protocol/openid-connect/auth"
              tokenUrl: "http://keycloak-service.{{ stack.keycloak.ns }}.svc.cluster.local:8080/realms/master/protocol/openid-connect/token"
              apiUrl: "http://keycloak-service.{{ stack.keycloak.ns }}.svc.cluster.local:8080/realms/master/protocol/openid-connect/userinfo"
            prometheus:
              url: "http://prometheus-operated.{{ stack.prometheus.ns }}.svc.cluster.local:9090/"
    - name: Update DNS with a record for Grafana
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ stack.grafana.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ edge_gateway.resources[0].status.addresses[0].value }}"
        type: A
        state: present

  - name: Deploy Alloy
    when: "stack.alloy.enabled | bool == true"
    block:
    - name: Create and label the Alloy namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ stack.alloy.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
        waypoint: "{{ cluster.mesh.kind == 'istio-ambient' }}"
    - name: Deploy the Alloy Helm Chart
      kubernetes.core.helm:
        name: alloy
        create_namespace: false
        release_namespace: "{{ stack.alloy.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ cluster.name }}.{{ host.dns.zone }}:{{ host.registry.port | int }}/kube-eng/kube-eng-alloy"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
            edge:
              kind: "{{ cluster.edge.kind }}"
              fqdn: "{{ stack.alloy.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
              gateway:
                name: "{{ cluster.edge.name }}"
                ns: "{{ cluster.edge.ns }}"
    - name: Update DNS with a record for Alloy
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ stack.alloy.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ edge_gateway.resources[0].status.addresses[0].value }}"
        type: A
        state: present

  - name: Deploy Loki
    when: "stack.loki.enabled | bool == true"
    block:
    - name: Create the loki S3 buckets
      s3_bucket:
        admin_access_key: admin
        admin_secret_key: "{{ admin_password }}"
        s3_endpoint: "https://{{ host.s3.name }}.{{ cluster.name }}.{{ host.dns.zone }}:9000"
        truststore_path: "{{ cluster.pki.config_path }}/ca.pem"
        bucket_name: "{{ item }}"
        state: present
      loop:
      - loki-admin
      - loki-ruler
      - loki-chunks
    - name: Create and label the Loki namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ stack.loki.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
        waypoint: "{{ cluster.mesh.kind == 'istio-ambient' }}"
    - name: Deploy the Loki Helm chart
      kubernetes.core.helm:
        name: loki
        create_namespace: false
        release_namespace: "{{ stack.loki.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ cluster.name }}.{{ host.dns.zone }}:{{ host.registry.port | int }}/kube-eng/kube-eng-loki"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
          loki:
            loki:
              storage:
                s3:
                  endpoint: https://{{ host.s3.name }}.kind:{{ host.s3.port }}
                  accessKeyId: admin
                  secretAccessKey: "{{ admin_password }}"
    - name: Update DNS with a record for Loki
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ stack.loki.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ edge_gateway.resources[0].status.addresses[0].value }}"
        type: A
        state: present

  - name: Deploy Tempo
    when: "stack.tempo.enabled | bool == true"
    block:
    - name: Create the Tempo S3 buckets
      s3_bucket:
        admin_access_key: admin
        admin_secret_key: "{{ admin_password }}"
        s3_endpoint: "https://{{ host.s3.name }}.{{ cluster.name }}.{{ host.dns.zone }}:9000"
        truststore_path: "{{ cluster.pki.config_path }}/ca.pem"
        bucket_name: tempo-traces
        state: present
    - name: Create and label the Tempo namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ stack.tempo.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
        waypoint: "{{ cluster.mesh.kind == 'istio-ambient' }}"
    - name: Deploy the Tempo Helm chart
      kubernetes.core.helm:
        name: tempo
        create_namespace: false
        release_namespace: "{{ stack.tempo.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ cluster.name }}.{{ host.dns.zone }}:{{ host.registry.port | int }}/kube-eng/kube-eng-tempo"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
            edge:
              kind: "{{ cluster.edge.kind }}"
              fqdn: "{{ stack.tempo.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
              gateway:
                name: "{{ cluster.edge.name }}"
                ns: "{{ cluster.edge.ns }}"
          tempo:
            tempo:
              storage:
                trace:
                  backend: s3
                  s3:
                    endpoint: "{{ host.s3.name }}.kind:{{ host.s3.port }}"
                    access_key: admin
                    secret_key: "{{ admin_password }}"
                    region: us-east-1
                    insecure: false
                    tls_insecure_skip_verify: true
    - name: Update DNS with a record for Tempo
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ stack.tempo.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ edge_gateway.resources[0].status.addresses[0].value }}"
        type: A
        state: present

  - name: Deploy Kiali
    when: "stack.kiali.enabled | bool == true"
    block:
    - name: Register Kiali in Keycloak
      community.general.keycloak_client:
        auth_keycloak_url: "https://{{ stack.keycloak.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
        auth_realm: master
        auth_username: admin
        auth_password: "{{ admin_password }}"
        client_id: "{{ stack.kiali.client_id }}"
        name: "{{ stack.kiali.client_id }}"
        description: "Kube Eng :: Kiali"
        enabled: true
        protocol: openid-connect
        public_client: false
        client_authenticator_type: client-secret
        secret: "{{ admin_password }}"
        root_url: "https://{{ stack.kiali.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}/"
        base_url: "https://{{ stack.kiali.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}/"
        admin_url: "https://{{ stack.kiali.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}/"
        redirect_uris:
        - "https://{{ stack.kiali.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}/*"
        standard_flow_enabled: true
        implicit_flow_enabled: false
        direct_access_grants_enabled: true
        default_client_scopes:
        - email
        - offline_access
        - profile
        - groups
        # TODO: Make Ansible trust the generated PKI CA certificate
        validate_certs: false
    - name: Collect information about the Kiali Service Account
      kubernetes.core.k8s_info:
        api_version: grafana.integreatly.org/v1beta1
        kind: GrafanaServiceAccount
        name: kiali-grafana-serviceaccount
        namespace: "{{ stack.grafana.ns }}"
      register: kiali_grafana_sa
    - name: Collect information about the Kiali Service Account token
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: "{{ kiali_grafana_sa.resources[0].status.account.tokens[0].secret.name }}"
        namespace: "{{ kiali_grafana_sa.resources[0].status.account.tokens[0].secret.namespace }}"
      register: kiali_grafana_sa_token
    - name: Create and label the Kiali namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ stack.kiali.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
        waypoint: "{{ cluster.mesh.kind == 'istio-ambient' }}"
    - name: Create a secret for the Kiali OIDC client secret
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: kiali
            namespace: "{{ stack.kiali.ns }}"
          type: Opaque
          stringData:
            oidc-secret: "{{ admin_password }}"
        state: present
    - name: Create a CA trust store ConfigMap for Kiali
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: kiali-cabundle
            namespace: "{{ stack.kiali.ns }}"
          data:
            additional-ca-bundle.pem: "{{ lookup('ansible.builtin.file', '{{ cluster.pki.config_path }}/ca.pem') }}"
    - name: Deploy the Kiali Helm Chart
      kubernetes.core.helm:
        name: kiali
        create_namespace: false
        release_namespace: "{{ stack.kiali.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ cluster.name }}.{{ host.dns.zone }}:{{ host.registry.port | int }}/kube-eng/kube-eng-kiali"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
            edge:
              kind: "{{ cluster.edge.kind }}"
              fqdn: "{{ stack.kiali.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
              gateway:
                name: "{{ cluster.edge.name }}"
                ns: "{{ cluster.edge.ns }}"
          integration:
            keycloak:
              client_id: "{{ stack.kiali.client_id }}"
              issuer_uri: "https://{{ stack.keycloak.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}/realms/master"
            prometheus:
              hostname: "{{ stack.prometheus.hostname }}"
              ns: "{{ stack.prometheus.ns }}"
              url: "http://prometheus-operated.{{ stack.prometheus.ns }}.svc.cluster.local:9090/"
            grafana:
              fqdn: "{{ stack.grafana.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
              ns: "{{ stack.grafana.ns }}"
              internal_url: "http://grafana-service.{{ stack.grafana.ns }}.svc.cluster.local:3000/"
              external_url: "https://{{ stack.grafana.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}/"
              auth:
                username: "{{ kiali_grafana_sa.resources[0].status.account.login }}"
                token: "{{ kiali_grafana_sa_token.resources[0].data.token | b64decode }}"
    - name: Update DNS with a record for Kiali
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ stack.kiali.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ edge_gateway.resources[0].status.addresses[0].value }}"
        type: A
        state: present
