# Argument requirements. See https://docs.ansible.com/ansible/latest/dev_guide/developing_program_flow_modules.html#argument-spec
---
argument_specs:
  main:
    short_description: Template the kube-eng cluster configuration
    options:
      control_plane_nodes:
        description: Number of control plane nodes
        type: int
        required: false
        default: 1
      worker_nodes:
        description: Number of worker nodes
        type: int
        required: false
        default: 3
      cluster_name:
        description: Name of the cluster
        type: str
        required: false
        default: kube-eng
      directory:
        description: Path to the directory to hold kind configuration
        type: str
        required: true
      ca_file_path:
        description: Path to the CA trust file which has signed the air gapped registry certificate
        type: str
        required: true
      airgap_registry_name:
        description: Name of the airgap registry
        type: str
        required: true
      pod_subnet_cidr:
        description: Pod subnet CIDR
        type: str
        required: true
      service_subnet_cidr:
        description: Service subnet CIDR
        type: str
        required: true
      cni:
        description: CNI plugin to use for the cluster
        type: str
        required: false
        default: kind
      oidc_discovery_url:
        description: OIDC discovery URL for the API server (e.g. https://idp.example.com/realms/master)
        type: str
        required: true
      oidc_issuer_url:
        description: OIDC issuer URL for the API server (e.g. https://idp.example.com/realms/master)
        type: str
        required: true
      oidc_client_id:
        description: OIDC client ID registered in the IDP for the Kubernetes cluster
        type: str
        required: true
      oidc_username_claim:
        description: JWT claim to use as the username
        type: str
        required: false
        default: preferred_username
      oidc_groups_claim:
        description: JWT claim to use as the user's groups
        type: str
        required: false
        default: groups
