---
- name: Create local DNS directories
  ansible.builtin.file:
    path: "{{ dns_local_config_path }}"
    state: directory

- name: Template named.conf
  ansible.builtin.template:
    src: templates/named.conf.j2
    dest: "{{ dns_local_config_path }}/named.conf"

- name: Template the BIND resolver key configuration
  ansible.builtin.template:
    src: templates/update.key.j2
    dest: "{{ dns_local_config_path }}/update.key"

- name: Template the kube-eng zone
  ansible.builtin.template:
    src: templates/db.zone.j2
    dest: "{{ dns_local_config_path }}/db.{{ dns_local_zone }}"
