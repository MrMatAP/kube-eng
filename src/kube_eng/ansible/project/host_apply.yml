---
- name: Apply the host infrastructure configuration
  hosts: localhost
  tasks:

  - name: Preheat k8s yaml files for later
    block:
    - name: Create a directory for preheated files
      ansible.builtin.file:
        path: "{{ preheat_path }}"
        state: directory
    - name: Preheat the ServiceMonitor CRD
      ansible.builtin.get_url:
        url: "{{ stack.prometheus.service_monitor_crd }}"
        dest: "{{ preheat_path }}/servicemonitor-crd.yaml"
    - name: Preheat the PodMonitor CRD
      ansible.builtin.get_url:
        url: "{{ stack.prometheus.pod_monitor_crd }}"
        dest: "{{ preheat_path }}/podmonitor-crd.yaml"
    - name: Preheat the Kubernetes Gateway CRDs
      ansible.builtin.get_url:
        url: "{{ cluster.edge.gateway_api_crds }}"
        dest: "{{ preheat_path }}/gateway-api-crds.yaml"
    - name: Preheat the CRD for cert-manager PKI
      ansible.builtin.get_url:
        url: "{{ cluster.pki.crd }}"
        dest: "{{ preheat_path }}/cert-manager-crds.yaml"
    - name: Preheat the KeyCloak Operator CRDs
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/{{ stack.keycloak.operator_version }}/kubernetes/{{ item }}"
        dest: "{{ preheat_path }}/{{ item }}"
      loop:
      - keycloaks.k8s.keycloak.org-v1.yml
      - keycloakrealmimports.k8s.keycloak.org-v1.yml

  - name: Template the cloud-provider-kind configuration
    ansible.builtin.import_role:
      name: cloud_provider_kind_configuration
    vars:
      cloud_provider_kind_url: "{{ host.tool.cloud_provider_kind.url }}"
      cloud_provider_kind_dir: "{{ host.tool.cloud_provider_kind.config_path }}"

  - name: Template the cloud-provider-mdns configuration
    ansible.builtin.import_role:
      name: cloud_provider_mdns_configuration
    vars:
      tool_cloud_provider_mdns: "{{ host.tool.cloud_provider_mdns.path }}"
      directory: "{{ host.tool.cloud_provider_mdns.config_path }}"
      user: "{{ user_id }}"

  - name: Create a dedicated docker network
    community.docker.docker_network:
      name: kind

  - name: Establish the local PKI
    block:
    - name: Create a directory for the local PKI
      ansible.builtin.file:
        path: "{{ host.pki.config_path }}"
        state: directory
    - name: Create a private key
      community.crypto.openssl_privatekey:
        path: "{{ host.pki.ca_key_path }}"
        type: "{{ host.pki.key_type }}"
        curve: "{{ host.pki.key_curve }}"
        size: "{{ host.pki.key_size }}"
        return_content: true
        state: present
    - name: Generate a CSR
      community.crypto.openssl_csr:
        path: "{{ host.pki.config_path }}/ca.csr"
        privatekey_path: "{{ host.pki.ca_key_path }}"
        common_name: "{{ cluster.name }} Local CA"
        key_usage_critical: true
        key_usage:
        - keyCertSign
        - cRLSign
        basic_constraints_critical: true
        basic_constraints:
        - "CA:TRUE"
        - "pathlen:1"
    - name: Create a self-signed CA
      community.crypto.x509_certificate:
        path: "{{ host.pki.ca_path }}"
        privatekey_path: "{{ host.pki.ca_key_path }}"
        csr_path: "{{ host.pki.config_path }}/ca.csr"
        provider: selfsigned
        return_content: true
    - name: Obtain the location of the current certifi trust store
      ansible.builtin.command:
        cmd: "python -mcertifi"
      register: trust_store_location
    - name: Copy the certifi trust store to the PKI directory
      ansible.builtin.copy:
        src: "{{ trust_store_location.stdout }}"
        dest: "{{ host.pki.ca_truststore_path }}"
        remote_src: true
    - name: Append the local CA to the certifi trust store
      ansible.builtin.lineinfile:
        path: "{{ host.pki.ca_truststore_path }}"
        line: "{{ lookup('ansible.builtin.file', host.pki.ca_path) }}"
        insertafter: EOF

  - name: Create a local DNS server, if enabled
    when: host.dns.kind == 'local'
    block:
    - name: Create a directory for DNS
      ansible.builtin.file:
        path: "{{ host.dns.config_path }}"
        state: directory
    - name: Template the local DNS configuration
      ansible.builtin.import_role:
        name: dns_local_configuration
      vars:
        dns_local_config_path: "{{ host.dns.config_path }}"
        dns_local_zone: "{{ host.dns.zone }}"
        dns_local_update_key: "{{ host.dns.key_secret }}"
    - name: Create a volume for the DNS cache
      community.docker.docker_volume:
        name: "{{ host.dns.cache_volume_name }}"
        state: present
    - name: Create a volume for the DNS zones
      community.docker.docker_volume:
        name: "{{ host.dns.zones_volume_name }}"
        state: present
    - name: Start the local DNS server
      community.docker.docker_container:
        name: "{{ host.dns.name }}"
        image: "{{ host.dns.image }}"
        mounts:
        - source: "{{ host.dns.cache_volume_name }}"
          target: /var/cache/bind
          type: volume
        - source: "{{ host.dns.zones_volume_name }}"
          target: /var/lib/bind
          type: volume
        - source: "{{ host.pki.ca_truststore_path }}"
          target: /etc/bind/truststore.pem
          read_only: true
          type: bind
        - source: "{{ host.dns.config_path }}/named.conf"
          target: /etc/bind/named.conf
          read_only: true
          type: bind
        - source: "{{ host.dns.config_path }}/update.key"
          target: /etc/bind/update.key
          read_only: true
          type: bind
        - source: "{{ host.dns.config_path }}/db.{{ host.dns.zone }}"
          target: /var/lib/bind/db.{{ host.dns.zone }}
          type: bind
        ports:
        - "{{ host.dns.host_ip }}:{{ host.dns.host_port | int }}:{{ host.dns.port | int }}/udp"
        - "{{ host.dns.host_ip }}:{{ host.dns.host_port | int }}:{{ host.dns.port | int }}/tcp"
        - "{{ host.dns.host_ip }}:{{ host.dns.host_control_port | int }}:{{ host.dns.control_port | int }}/tcp"
        networks:
        - name: kind
          aliases: "{{ host.dns.name }}"
        keep_volumes: false
        restart_policy: always
        state: healthy

  - name: Create a local registry, if enabled
    when: host.registry.enabled == true
    block:
    - name: Create a directory for the registry
      ansible.builtin.file:
        path: "{{ host.registry.config_path }}"
        state: directory
    - name: Create a private key for the registry
      community.crypto.openssl_privatekey:
        path: "{{ host.registry.config_path }}/registry.key"
        type: "{{ host.pki.key_type }}"
        curve: "{{ host.pki.key_curve }}"
        size: "{{ host.pki.key_size }}"
        state: present
    - name: Generate a CSR for the registry
      community.crypto.openssl_csr:
        path: "{{ host.registry.config_path }}/registry.csr"
        privatekey_path: "{{ host.registry.config_path }}/registry.key"
        common_name: "{{ host.registry.name }}.{{ host.dns.zone }}"
        subject_alt_name:
        - "DNS:{{ host.registry.name }}.{{ host.dns.zone }}"
        - "DNS:{{ host.registry.name }}.kind"
        - "DNS:{{ host.registry.name }}"
        - "DNS:localhost"
        basic_constraints_critical: true
        basic_constraints:
        - "CA:FALSE"
    - name: Sign the certificate for the registry
      community.crypto.x509_certificate:
        path: "{{ host.registry.config_path }}/registry.pem"
        csr_path: "{{ host.registry.config_path }}/registry.csr"
        ownca_path: "{{ host.pki.ca_path }}"
        ownca_privatekey_path: "{{ host.pki.ca_key_path }}"
        ownca_not_after: "{{ host.pki.crt_validity }}"
        provider: ownca
    - name: Configure the registry
      ansible.builtin.import_role:
        name: registry_configuration
      vars:
        directory: "{{ host.registry.config_path }}"
    - name: Create a volume for the registry
      community.docker.docker_volume:
        name: "{{ host.registry.volume_name }}"
        state: present
    - name: Start the registry
      community.docker.docker_container:
        name: "{{ host.registry.name }}"
        image: "{{ host.registry.image }}"
        mounts:
        - source: "{{ host.registry.volume_name }}"
          target: /data
        - source: "{{ host.registry.config_path }}/config.json"
          target: /etc/zot/config.json
          read_only: true
          type: bind
        - source: "{{ host.registry.config_path }}/registry.key"
          target: /etc/zot/registry.key
          read_only: true
          type: bind
        - source: "{{ host.registry.config_path }}/registry.pem"
          target: /etc/zot/registry.pem
          read_only: true
          type: bind
        ports:
        - "{{ host.registry.host_ip }}:{{ host.registry.host_port | int }}:{{ host.registry.port | int }}/tcp"
        networks:
        - name: kind
          aliases: "{{ host.registry.name }}"
        keep_volumes: false
        restart_policy: always
        state: healthy
    - name: Update DNS with a record for the registry
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ host.registry.name }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ host.registry.host_ip }}"
        type: A
        state: present

  - name: Create a local PostgreSQL instance, if enabled
    when: host.postgresql.enabled == true
    block:
    - name: Create a volume for PostgreSQL
      community.docker.docker_volume:
        name: "{{ host.postgresql.volume_name }}"
        state: present
    - name: Start PostgreSQL
      community.docker.docker_container:
        name: "{{ host.postgresql.name }}"
        image: "{{ host.postgresql.image }}"
        ports:
        - "{{ host.postgresql.host_ip }}:{{ host.postgresql.host_port | int }}:{{ host.postgresql.port | int }}/tcp"
        mounts:
        - source: "{{ host.postgresql.volume_name }}"
          target: /var/lib/postgresql/data
        networks:
        - name: kind
          aliases: "{{ host.postgresql.name }}.{{ host.dns.zone }}"
        env:
          POSTGRES_PASSWORD: "{{ admin_password }}"
          PGDATA: /var/lib/postgresql/data
        keep_volumes: false
        restart_policy: always
        state: healthy
    - name: Update DNS with a record for PostgreSQL
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ host.postgresql.name }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ host.postgresql.host_ip }}"
        type: A
        state: present

  - name: Create a local IDP, if enabled
    when: host.idp.enabled == true
    block:
    - name: Create a user for the IDP in PostgreSQL
      community.postgresql.postgresql_user:
        login_host: "{{ host.postgresql.host_ip }}"
        login_port: "{{ host.postgresql.host_port | int }}"
        login_user: postgres
        login_password: "{{ admin_password }}"
        login_db: postgres
        name: "{{ host.idp.db_user }}"
        password: "{{ admin_password }}"
        comment: "IDP DB User"
        state: present
      environment:
        PGOPTIONS: "-c password_encryption=scram-sha-256"
    - name: Create a database for the IDP in PostgreSQL
      community.postgresql.postgresql_db:
        login_host: "{{ host.postgresql.host_ip }}"
        login_port: "{{ host.postgresql.host_port | int }}"
        login_user: postgres
        login_password: "{{ admin_password }}"
        name: "{{ host.idp.db_name }}"
        owner: "{{ host.idp.db_user }}"
        comment: "IDP Database"
        encoding: UTF-8
        state: present
    - name: Configure the IDP config directory
      ansible.builtin.file:
        path: "{{ host.idp.config_path }}"
        state: directory
    - name: Create a private key for the IDP
      community.crypto.openssl_privatekey:
        path: "{{ host.idp.config_path }}/idp_key.pem"
        type: "{{ host.pki.key_type }}"
        curve: "{{ host.pki.key_curve }}"
        size: "{{ host.pki.key_size }}"
        state: present
    - name: Generate a CSR for the IDP
      community.crypto.openssl_csr:
        path: "{{ host.idp.config_path }}/idp_cert.csr"
        privatekey_path: "{{ host.idp.config_path }}/idp_key.pem"
        common_name: "{{ host.idp.name }}.{{ host.dns.zone }}"
        subject_alt_name:
        - "DNS:{{ host.idp.name }}.{{ host.dns.zone }}"
        - "DNS:{{ host.idp.name }}.kind"
        - "DNS:{{ host.idp.name }}"
        - "DNS:localhost"
        basic_constraints_critical: true
        basic_constraints:
        - "CA:FALSE"
    - name: Sign the certificate for the IDP
      community.crypto.x509_certificate:
        path: "{{ host.idp.config_path }}/idp_cert.pem"
        csr_path: "{{ host.idp.config_path }}/idp_cert.csr"
        ownca_path: "{{ host.pki.ca_path }}"
        ownca_privatekey_path: "{{ host.pki.ca_key_path }}"
        ownca_not_after: "{{ host.pki.crt_validity }}"
        provider: ownca
    - name: Deploy the local IDP
      community.docker.docker_container:
        name: "{{ host.idp.name }}"
        image: "{{ host.idp.image }}"
        ports:
        - "{{ host.idp.host_ip }}:{{ host.idp.host_port | int }}:{{ host.idp.port | int }}/tcp"
        mounts:
        - source: "{{ host.idp.config_path }}"
          target: /config
          read_only: true
          type: bind
        networks:
        - name: kind
          aliases: "{{ host.idp.name }}"
        env:
          KC_BOOTSTRAP_ADMIN_USERNAME: admin
          KC_BOOTSTRAP_ADMIN_PASSWORD: "{{ admin_password }}"
          KC_HTTP_ENABLED: "false"
          KC_HTTPS_CERTIFICATE_KEY_FILE: /config/idp_key.pem
          KC_HTTPS_CERTIFICATE_FILE: /config/idp_cert.pem
          KC_HTTPS_PORT: "{{ host.idp.port | quote }}"
          KC_HTTPS_PROTOCOLS: "TLSv1.3"
          KC_HTTPS_MANAGEMENT_CERTIFICATE_KEY_FILE: /config/idp_key.pem
          KC_HTTPS_MANAGEMENT_CERTIFICATE_FILE: /config/idp_cert.pem
          KC_DB: postgres
          KC_DB_URL_HOST: "{{ host.postgresql.name }}.kind"
          KC_DB_URL_PORT: "{{ host.postgresql.port | quote }}"
          KC_DB_URL_DATABASE: "{{ host.idp.db_name }}"
          KC_DB_USERNAME: "{{ host.idp.db_user }}"
          KC_DB_PASSWORD: "{{ admin_password }}"
          KC_HOSTNAME: "https://{{ host.idp.name }}.{{ host.dns.zone }}:{{ host.idp.port }}/"
          KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
        keep_volumes: false
        command: "start-dev"
        restart_policy: always
        state: healthy
    - name: Update DNS with a record for the IDP
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ host.idp.name }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ host.idp.host_ip }}"
        type: A
        state: present

  - name: Create a local S3 instance, if enabled
    when: host.s3.enabled == true
    block:
    - name: Create a volume for S3
      community.docker.docker_volume:
        name: "{{ host.s3.volume_name }}"
        state: present
    - name: Configure the S3 config directory
      ansible.builtin.file:
        path: "{{ host.s3.config_path }}/config"
        state: directory
    - name: Create a private key for S3
      community.crypto.openssl_privatekey:
        path: "{{ host.s3.config_path }}/rustfs_key.pem"
        type: "{{ host.pki.key_type }}"
        curve: "{{ host.pki.key_curve }}"
        size: "{{ host.pki.key_size }}"
        state: present
    - name: Generate a CSR for S3
      community.crypto.openssl_csr:
        path: "{{ host.s3.config_path }}/rustfs_cert.csr"
        privatekey_path: "{{ host.s3.config_path }}/rustfs_key.pem"
        common_name: "{{ host.s3.name }}.{{ host.dns.zone }}"
        subject_alt_name:
        - "DNS:{{ host.s3.name }}.{{ host.dns.zone }}"
        - "DNS:{{ host.s3.name }}.kind"
        - "DNS:{{ host.s3.name }}"
        - "DNS:localhost"
        basic_constraints_critical: true
        basic_constraints:
        - "CA:FALSE"
    - name: Sign the certificate for S3
      community.crypto.x509_certificate:
        path: "{{ host.s3.config_path }}/rustfs_cert.pem"
        csr_path: "{{ host.s3.config_path }}/rustfs_cert.csr"
        ownca_path: "{{ host.pki.ca_path }}"
        ownca_privatekey_path: "{{ host.pki.ca_key_path }}"
        ownca_not_after: "{{ host.pki.crt_validity }}"
        provider: ownca
    - name: Start S3
      community.docker.docker_container:
        name: "{{ host.s3.name }}"
        image: "{{ host.s3.image }}"
        ports:
        - "{{ host.s3.host_ip }}:{{ host.s3.host_port | int }}:{{ host.s3.port | int }}/tcp"
        - "{{ host.s3.host_ip }}:{{ host.s3.host_console_port | int }}:{{ host.s3.console_port | int }}/tcp"
        mounts:
        - source: "{{ host.s3.volume_name }}"
          target: /data
        - source: "{{ host.s3.config_path }}"
          target: /opt/tls
          read_only: true
          type: bind
        networks:
        - name: kind
          aliases: "{{ host.s3.name }}"
        env:
          RUSTFS_ACCESS_KEY: admin
          RUSTFS_SECRET_KEY: "{{ admin_password }}"
          RUSTFS_CONSOLE_ENABLE: "true"
          RUSTFS_TLS_PATH: "/opt/tls/"
        command: "/data"
        keep_volumes: false
        restart_policy: always
        state: healthy
    - name: Update DNS with a record for S3
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ host.s3.name }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ host.s3.host_ip }}"
        type: A
        state: present

  - name: Create a local Kafka instance, if enabled
    when: host.kafka.enabled == true
    block:
    - name: Configure the Kafka secrets directory
      ansible.builtin.file:
        path: "{{ host.kafka.config_path }}/secrets"
        state: directory
    - name: Configure the Kafka config directory
      ansible.builtin.file:
        path: "{{ host.kafka.config_path }}/config"
        state: directory
    - name: Create a volume for Kafka
      community.docker.docker_volume:
        name: "{{ host.kafka.volume_name }}"
        state: present
    - name: Start Kafka
      community.docker.docker_container:
        name: "{{ host.kafka.name }}"
        image: "{{ host.kafka.image }}"
        ports:
        - "{{ host.kafka.host_ip }}:{{ host.kafka.host_port | int }}:{{ host.kafka.port | int }}/tcp"
        mounts:
        - source: "{{ host.kafka.volume_name }}"
          target: /var/lib/kafka/data
        - source: "{{ host.kafka.config_path }}/config"
          target: /mnt/shared/config
          type: bind
        - source: "{{ host.kafka.config_path }}/secrets"
          target: /etc/kafka/secrets
          read_only: true
          type: bind
        networks:
        - name: kind
          aliases: "{{ host.kafka.name }}"
        keep_volumes: false
        restart_policy: always
        state: healthy
    - name: Update DNS with a record for Kafka
      community.general.nsupdate:
        key_name: "{{ host.dns.key_name }}"
        key_secret: "{{ host.dns.key_secret }}"
        key_algorithm: "{{ host.dns.key_algorithm }}"
        server: "{{ host.dns.server }}"
        port: "{{ host.dns.port | int }}"
        protocol: "{{ host.dns.protocol }}"
        record: "{{ host.kafka.name }}.{{ host.dns.zone }}."
        ttl: "{{ host.dns.ttl | int }}"
        value: "{{ host.kafka.host_ip }}"
        type: A
        state: present

  - name: Package the Helm charts
    ansible.builtin.command:
      cmd: |
        {{ host.tool.helm.path }} package 
        --version {{ host.tool.helm.chart_version }} 
        --dependency-update 
        --destination {{ host.tool.helm.packaged_chart_path }} 
        {{ host.tool.helm.chart_path }}/{{ item }}
      creates: "{{ host.tool.helm.packaged_chart_path }}/{{ item }}-{{ host.tool.helm.chart_version }}.tgz"
    loop:
    - kube-eng-cilium
    - kube-eng-istio
    - kube-eng-cert-manager
    - kube-eng-prometheus
    - kube-eng-edge
    - kube-eng-loki
    - kube-eng-alloy
    - kube-eng-grafana
    - kube-eng-kiali

#
# If you used a local DNS server, then you must now configure your host to point to 127.0.0.1:53
# You must also trust the CA that was generated for you using security add-certificates ~/.kube-eng/pki/ca.pem
