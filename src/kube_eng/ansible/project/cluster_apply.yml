---
- name: Apply the cluster configuration
  hosts: localhost
  tasks:

  # This will fail if we use a local DNS server and haven't pointed to it yet
  - name: Upload the Helm charts to the local registry
    ansible.builtin.command:
      cmd: |
        {{ host.tool.helm.path }} push 
        {{ host.tool.helm.packaged_chart_path }}/{{ item }}-{{ host.tool.helm.chart_version }}.tgz 
        oci://{{ host.registry.name }}.{{ cluster.name }}.{{ host.dns.zone }}:{{ host.registry.port | int }}/kube-eng
    loop:
    - kube-eng-alloy
    - kube-eng-cert-manager
    - kube-eng-edge
    - kube-eng-grafana
    - kube-eng-istio
    - kube-eng-tempo
    - kube-eng-keycloak
    - kube-eng-keycloak-operator
    - kube-eng-kiali
    - kube-eng-loki
    - kube-eng-prometheus
    - kube-eng-cilium

  - name: Template the cluster configuration
    ansible.builtin.import_role:
      name: kind_configuration
    vars:
      control_plane_nodes: "{{ cluster.control_plane_nodes | int }}"
      worker_nodes: "{{ cluster.worker_nodes | int }}"
      cluster_name: "{{ cluster.name }}"
      directory: "{{ host.tool.kind.config_path }}"
      ca_file_path: "{{ cluster.pki.config_path }}/ca.pem"
      airgap_registry_name: "{{ host.registry.name }}"
      pod_subnet_cidr: "{{ cluster.pod_subnet_cidr }}"
      service_subnet_cidr: "{{ cluster.service_subnet_cidr }}"
      cni: "{{ cluster.cni.kind }}"

  - name: Create the cluster
    kind_cluster:
      cluster_name: "{{ cluster.name }}"
      config_file: "{{ host.tool.kind.config_path }}/config.yaml"
      tool_kind: "{{ host.tool.kind.path }}"
      state: present

  - name: Apply the ServiceMonitor CRD
    kubernetes.core.k8s:
      state: present
      apply: true
      src: "{{ preheat_path }}/servicemonitor-crd.yaml"
      server_side_apply:
        field_manager: ansible
      wait: true

  - name: Apply the PodMonitor CRD
    kubernetes.core.k8s:
      state: present
      apply: true
      src: "{{ preheat_path }}/podmonitor-crd.yaml"
      server_side_apply:
        field_manager: ansible
      wait: true

    # Note: This should not run at the same time as cloud-provider-kind, as it will create
    # a conflict for the field-manager.
  - name: Apply the Gateway API CRDs
    kubernetes.core.k8s:
      state: present
      apply: true
      src: "{{ preheat_path }}/gateway-api-crds.yaml"
      server_side_apply:
        field_manager: ansible
      wait: true

  - name: Deploy Cilium CNI, if enabled
    when: "cluster.cni.kind == 'cilium'"
    block:
    - name: Deploy Cilium
      kubernetes.core.helm:
        name: cilium
        create_namespace: true
        release_namespace: cilium
        chart_ref: "oci://{{ host.registry.name }}.{{ cluster.name }}.{{ host.dns.zone }}:{{ host.registry.port | int }}/kube-eng/kube-eng-cilium"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
            edge:
              kind: "{{ cluster.edge.kind }}"
              fqdn: "{{ cluster.cni.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
              gateway:
                name: "{{ cluster.edge.name }}"
                ns: "{{ cluster.edge.ns }}"
          cilium:
            cni:
              exclusive: "{{ cluster.cni.exclusive }}"
            ui:
              enabled: "{{ cluster.cni.ui }}"


  - name: Deploy Istio, if enabled
    when: "cluster.mesh.enabled | bool == true"
    block:
    - name: Deploy Istio
      kubernetes.core.helm:
        name: istio
        create_namespace: true
        release_namespace: "{{ cluster.mesh.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ cluster.name }}.{{ host.dns.zone }}:{{ host.registry.port | int }}/kube-eng/kube-eng-istio"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          ambient: "{{ cluster.mesh.kind == 'istio-ambient' }}"
          classic_gateway: "{{ cluster.edge.kind == 'istio' }}"
          overrides_istiod:
            defaultRevision: default
            profile: "{{ (cluster.mesh.kind == 'istio-ambient') | ternary('ambient', 'default') }}"
          overrides_cni:
            profile: "{{ (cluster.mesh.kind == 'istio-ambient') | ternary('ambient', 'default') }}"
    - name: Create a service entry for the S3 service, if enabled
      when: "host.s3.enabled | bool == true"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.istio.io/v1
          kind: ServiceEntry
          metadata:
            name: service-s3
            namespace: "{{ cluster.mesh.ns }}"
            labels:
              app.kubernetes.io/name: service-s3
          spec:
            location: MESH_EXTERNAL
            resolution: DNS
            hosts:
            - "{{ host.s3.name }}.kind"
            ports:
            - name: s3-https
              number: 9000
              protocol: TLS
    - name: Create a service entry for the PG service, if enabled
      when: "host.postgresql.enabled | bool == true"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.istio.io/v1
          kind: ServiceEntry
          metadata:
            name: service-pg
            namespace: "{{ cluster.mesh.ns }}"
            labels:
              app.kubernetes.io/name: service-pg
          spec:
            location: MESH_EXTERNAL
            resolution: DNS
            hosts:
            - "{{ host.postgresql.name }}.kind"
            ports:
            - name: postgres
              number: 5432
              protocol: TCP

  - name: Deploy cluster PKI
    block:
    - name: Create and label the cert-manager namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ cluster.pki.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
    - name: Apply the cert-manager CRDs
      kubernetes.core.k8s:
        state: present
        apply: true
        src: "{{ preheat_path }}/cert-manager-crds.yaml"
        server_side_apply:
          field_manager: ansible
        wait: true
    - name: Create a secret from the local CA files
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          type: Opaque
          metadata:
            name: cluster-ca
            namespace: "{{ cluster.pki.ns }}"
          data:
            tls.crt: "{{ lookup('ansible.builtin.file', '{{ cluster.pki.config_path }}/ca.pem') | b64encode }}"
            tls.key: "{{ lookup('ansible.builtin.file', '{{ cluster.pki.config_path }}/ca.key') | b64encode }}"
    - name: Declare the local CA as an issuer
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: ca-issuer
            namespace: "{{ cluster.pki.ns }}"
          spec:
            ca:
              secretName: cluster-ca
    - name: Deploy the cert-manager Helm chart
      kubernetes.core.helm:
        name: cert-manager
        create_namespace: false
        release_namespace: "{{ cluster.pki.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ cluster.name }}.{{ host.dns.zone }}:{{ host.registry.port | int }}/kube-eng/kube-eng-cert-manager"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          overrides:
            namespace: "{{ cluster.pki.ns }}"
            prometheus:
              enabled: "{{ stack.prometheus.enabled | bool }}"

  - name: Deploy Edge
    block:
    - name: Create and label the Edge namespace
      ansible.builtin.import_role:
        name: create_namespace
      vars:
        ns: "{{ cluster.edge.ns }}"
        mesh: "{{ cluster.mesh.kind }}"
    - name: Deploy the Edge Helm chart
      kubernetes.core.helm:
        name: edge
        create_namespace: false
        release_namespace: "{{ cluster.edge.ns }}"
        chart_ref: "oci://{{ host.registry.name }}.{{ cluster.name }}.{{ host.dns.zone }}:{{ host.registry.port | int }}/kube-eng/kube-eng-edge"
        chart_version: "{{ host.tool.helm.chart_version }}"
        binary_path: "{{ host.tool.helm.path }}"
        wait: true
        values:
          cluster:
            name: "{{ cluster.name }}"
            edge:
              kind: "{{ cluster.edge.kind }}"
              name: "{{ cluster.edge.name }}"
          gateway:
            classname: "{{ (cluster.edge.kind == 'traefik') | ternary('traefik', 'istio') }}"
          traefik:
            enabled: "{{ cluster.edge.kind == 'traefik' }}"
          stack:
            cni:
              enabled: "{{ cluster.cni.ui }}"
              fqdn: "{{ cluster.cni.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
            prometheus:
              enabled: "{{ stack.prometheus.enabled }}"
              fqdn: "{{ stack.prometheus.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
            alloy:
              enabled: "{{ stack.alloy.enabled }}"
              fqdn: "{{ stack.alloy.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
            keycloak:
              enabled: "{{ stack.keycloak.enabled }}"
              fqdn: "{{ stack.keycloak.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
            grafana:
              enabled: "{{ stack.grafana.enabled }}"
              fqdn: "{{ stack.grafana.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
            tempo:
              enabled: "{{ stack.tempo.enabled }}"
              fqdn: "{{ stack.tempo.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
            kiali:
              enabled: "{{ stack.kiali.enabled }}"
              fqdn: "{{ stack.kiali.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"
            loki:
              enabled: "{{ stack.loki.enabled }}"
              fqdn: "{{ stack.loki.hostname }}.{{ cluster.name }}.{{ host.dns.zone }}"


# You now need to start cloud-provider-kind as root
