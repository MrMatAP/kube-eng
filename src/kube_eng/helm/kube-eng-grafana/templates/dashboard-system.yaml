---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: grafana-system-folder
  labels:
    app.kubernetes.io/name: grafana-system-folder
spec:
  title: System
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-system-k8s
  labels:
    app.kubernetes.io/name: grafana-system-k8s
spec:
  folderRef: grafana-system-folder
  datasources:
  - datasourceName: prometheus
    inputName: DS_PROMETHEUS
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  grafanaCom:
    id: 15661
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-system-coredns
  labels:
    app.kubernetes.io/name: grafana-system-coredns
spec:
  folderRef: grafana-system-folder
  datasources:
  - datasourceName: prometheus
    inputName: DS_PROMETHEUS
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  grafanaCom:
    id: 14981
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-system-kube-state-metrics
  labels:
    app.kubernetes.io/name: grafana-system-kube-state-metrics
spec:
  folderRef: grafana-system-folder
  datasources:
  - datasourceName: prometheus
    inputName: DS_PROMETHEUS
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  grafanaCom:
    id: 16520