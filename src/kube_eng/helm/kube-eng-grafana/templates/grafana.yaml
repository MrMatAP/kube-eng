apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    {{ include "common.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
    dashboards: "grafana"
spec:
  persistentVolumeClaim:
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 3Gi
  deployment:
    spec:
      template:
        spec:
          volumes:
          - name: grafana-data
            persistentVolumeClaim:
              claimName: grafana-pvc
          - name: dashboards
            emptyDir: {}
          - name: dashboard-provisioning-config
            configMap:
              name: dashboard-provisioning-config
          containers:
            - name: grafana
              volumeMounts:
              - mountPath: /etc/grafana/provisioning/dashboards
                name: dashboard-provisioning-config
              - mountPath: /var/lib/grafana/dashboards
                name: dashboards
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-secret
                      key: GF_SECURITY_ADMIN_USER
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-secret
                      key: GF_SECURITY_ADMIN_PASSWORD
                - name: AUTH_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oauth-secret
                      key: client-id
                - name: AUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oauth-secret
                      key: client-secret
            - name: dashboard-sidecar
              image: 'ghcr.io/kiwigrid/k8s-sidecar:1.24.5'
              env:
              - name: LABEL
                value: "grafana_dashboard"
              - name: LABEL_VALUE
                value: "1"
              - name: FOLDER
                value: /var/lib/grafana/dashboards
              - name: NAMESPACE
                value: ALL
              - name: RESOURCE
                value: configmap
              volumeMounts:
              - mountPath: /var/lib/grafana/dashboards
                name: dashboards
  config:
    analytics:
      check_for_updates: "false"
    log:
      mode: "console"
    server:
      root_url: {{ .Values.integration.rootUrl }}
    auth:
      disable_login_form: "false"
    auth_generic_oauth:
      enabled: "true"
      allow_sign_up: "true"
      name: Keycloak-OAuth
      client_id: ${AUTH_CLIENT_ID}
      client_secret: ${AUTH_CLIENT_SECRET}
      auth_url: {{ .Values.integration.oauth.authUrl }}
      token_url: {{ .Values.integration.oauth.tokenUrl}}
      api_url: {{ .Values.integration.oauth.apiUrl }}
      scopes: openid email profile offline_access roles
      email_attribute_path: email
      login_attribute_path: username
      name_attribute_path: full_name
      role_attribute_path: contains(resource_access.grafana.roles.[*], 'Admin') && 'Admin' || contains(resource_access.grafana.roles.[*], 'Editor') && 'Editor' || 'Viewer'
