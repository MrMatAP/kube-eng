apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: datasource-prometheus
  labels:
    {{ include "common.labels" . | nindent 4 }}
    app.kubernetes.io/name: datasource-prometheus
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasource:
    name: prometheus
    type: prometheus
    access: proxy
    url: {{ .Values.integration.prometheus.url }}
    isDefault: {{ .Values.integration.prometheus.isDefault }}