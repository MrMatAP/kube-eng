apiVersion: v1
kind: Secret
metadata:
  name: grafana-oauth-secret
  labels:
    {{ include "common.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana-oauth-secret
type: Opaque
stringData:
  client-id: "{{ .Values.integration.oauth.clientId }}"
  client-secret: "{{ .Values.integration.oauth.clientSecret }}"
