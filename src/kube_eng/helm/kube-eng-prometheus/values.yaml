#
# Default values for Kube Eng :: Prometheus

cluster:
  name: cluster
  edge:
    kind: traefik
    fqdn: prometheus.cluster.k8s
    gateway:
      name: gateway
      ns: edge
      section: prometheus
#
# Dependency Chart overrides

overrides:
  nameOverride: prometheus
  alertmanager:
    enabled: false
    ingress:
      enabled: false
  grafana:
    enabled: true
    ingress:
      enabled: false
  prometheus:
    enabled: true
    ingress:
      enabled: false

