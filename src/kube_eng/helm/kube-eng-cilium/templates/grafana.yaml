---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: grafana-cilium-folder
spec:
  title: Cilium
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-cilium-policy-verdicts
spec:
  folderRef: grafana-cilium-folder
  datasources:
  - datasourceName: prometheus
    inputName: DS_PROMETHEUS
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  grafanaCom:
    id: 18015
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-cilium-agent-metrics
spec:
  folderRef: grafana-cilium-folder
  datasources:
  - datasourceName: prometheus
    inputName: DS_PROMETHEUS
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  grafanaCom:
    id: 15513
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-cilium-operator-metrics
spec:
  folderRef: grafana-cilium-folder
  datasources:
  - datasourceName: prometheus
    inputName: DS_PROMETHEUS
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  grafanaCom:
    id: 14501
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-cilium-hubble-metrics
spec:
  folderRef: grafana-cilium-folder
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  grafanaCom:
    id: 14502
---
