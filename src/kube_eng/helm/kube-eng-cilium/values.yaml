#
# Default values for Kube Eng :: Cilium

cluster:
  name: cluster
  edge:
    kind: istio-gateway-api
    fqdn: cni.cluster.k8s
    gateway:
      name: edge-gateway
      ns: edge
      section: cni

#
# Dependency Chart overrides

cilium:
  cni:
    exclusive: false
  rollOutCiliumPods: true
  hubble:
    enabled: false
    dashboards:
      enabled: true
    metrics:
      enabled:
        - dns
        - drop
        - tcp
        - flow
        - http
        - "policy:sourceContext=app|workload-name|pod|reserved-identity;destinationContext=app|workload-name|pod|dns|reserved-identity;labelsContext=source_namespace,destination_namespace"
      serviceMonitor:
        enabled: false
        jobLabel: app.kubernetes.io/name
        labels:
          app.kubernetes.io/monitored-by: prometheus
        relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          action: replace
          targetLabel: node
    relay:
      enabled: false
      prometheus:
        enabled: false
        serviceMonitor:
          enabled: true
          labels:
            app.kubernetes.io/monitored-by: prometheus
          jobLabel: app.kubernetes.io/name
          relabelings:
          - sourceLabels: [ __meta_kubernetes_pod_node_name ]
            action: replace
            targetLabel: node
    ui:
      enabled: false
  ingressController:
    enabled: false
  gatewayAPI:
    enabled: true
    enableProxyProtocol: true
    enableAppProto: true
    enableAlpn: true
  hostNetwork:
    enabled: false
  logSystemLoad: true
  prometheus:
    metricsService: true
    enabled: true
    serviceMonitor:
      enabled: true
      labels:
        app.kubernetes.io/monitored-by: prometheus
      jobLabel: app.kubernetes.io/name
      relabelings:
      - sourceLabels: [ __meta_kubernetes_pod_node_name ]
        action: replace
        targetLabel: node
    dashboards:
      enabled: true
  envoy:
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          app.kubernetes.io/monitored-by: prometheus
        jobLabel: app.kubernetes.io/name
        relabelings:
        - sourceLabels: [ __meta_kubernetes_pod_node_name ]
          action: replace
          targetLabel: node
  operator:
    prometheus:
      metricsService: true
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          app.kubernetes.io/monitored-by: prometheus
        jobLabel: app.kubernetes.io/name
        relabelings:
        - sourceLabels: [ __meta_kubernetes_pod_node_name ]
          action: replace
          targetLabel: node
    dashboards:
      enabled: true
