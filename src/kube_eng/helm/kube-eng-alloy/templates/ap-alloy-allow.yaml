apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  labels:
    {{ include "common.labels" . | nindent 4 }}
  name: ap-alloy-allow
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - cluster.local/ns/edge/sa/gw-edge-istio
        - cluster.local/ns/prometheus/sa/prometheus-prometheus
    to:
    - operation:
        ports:
        - "12345"
  targetRefs:
  - group: ""
    kind: Service
    name: alloy
