apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sm-alloy
  labels:
    app.kubernetes.io/monitored-by: prometheus
    app.kubernetes.io/name: sm-alloy
spec:
  endpoints:
  - honorLabels: false
    port: http-metrics
    scheme: http
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy
  jobLabel: app.kubernetes.io/name