apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    {{ include "common.labels" . | nindent 4 }}
    app.kubernetes.io/name: pm-istio-ztunnel
    app.kubernetes.io/monitored-by: prometheus
  name: pm-istio-ztunnel
spec:
  podMetricsEndpoints:
  - honorLabels: true
    interval: 10s
    scheme: http
    path: /metrics
    port: ztunnel-stats
    relabelings:
    - action: replace
      replacement: ${1}
      sourceLabels:
      - __meta_kubernetes_pod_node_name
      targetLabel: node
  namespaceSelector:
    matchNames:
    - istio-system
  selector:
    matchLabels:
      app.kubernetes.io/name: ztunnel
