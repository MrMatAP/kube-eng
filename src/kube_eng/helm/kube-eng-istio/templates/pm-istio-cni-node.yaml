apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    {{ include "common.labels" . | nindent 4 }}
    app.kubernetes.io/name: pm-istio-cni-node
    app.kubernetes.io/monitored-by: prometheus
  name: pm-istio-cni-node
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
    - istio-system
  selector:
    matchLabels:
      app.kubernetes.io/name: istio-cni
      app.kubernetes.io/instance: istio
  podMetricsEndpoints:
  - honorLabels: false
    interval: 10s
    scheme: http
    port: metrics
    path: /metrics
    relabelings:
    - action: replace
      replacement: ${1}
      sourceLabels:
      - __meta_kubernetes_pod_node_name
      targetLabel: node
