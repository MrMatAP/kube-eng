apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    {{ include "common.labels" . | nindent 4 }}
    app.kubernetes.io/name: sm-keycloak
    app.kubernetes.io/monitored-by: prometheus
  name: sm-keycloak
spec:
  jobLabel: app.kubernetes.io/instance
  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: keycloak-operator
  endpoints:
  - honorLabels: true
    interval: 10s
    path: /metrics
    port: management
    relabelings:
    - action: replace
      replacement: ${1}
      sourceLabels:
      - __meta_kubernetes_pod_node_name
      targetLabel: node
