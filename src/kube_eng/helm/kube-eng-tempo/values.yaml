#
# Default values for Kube Eng :: Tempo

cluster:
  name: cluster
  edge:
    kind: istio-gateway-api
    fqdn: tempo.cluster.k8s
    gateway:
      name: edge
      ns: edge
      section: tempo

tempo:
  extraVolumes:
  - name: truststore
    configMap:
      name: tempo-truststore
  tempo:
    reportingEnabled: false
    metricsGenerator:
      enabled: true
      remoteWriteUrl: "http://prometheus.prometheus.svc.cluster.local:9090/api/v1/write"
    extraVolumeMounts:
    - name: truststore
      mountPath: /opt/truststore
      readonly: true
    storage:
      trace:
        backend: s3
        s3:
          bucket: tempo-traces
          endpoint: "https://s3.kind:9000"
          access_key: null
          secret_key: null
          region: us-east-1
          insecure: false
          tls_insecure_skip_verify: false
          tls_ca_path: /opt/truststore/truststore.pem
  serviceMonitor:
    enabled: true
    additionalLabels:
      app.kubernetes.io/monitored-by: prometheus
  networkPolicy:
    enabled: false
  serviceAccount:
    create: true
    name: sa-tempo
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
