apiVersion: kiali.io/v1alpha1
kind: Kiali
metadata:
  name: kiali
  labels:
    {{ include "common.labels" . | nindent 4 }}
    app.kubernetes.io/name: kiali
spec:
  auth:
    strategy: "anonymous"
  deployment:
    replicas: 1
    network_policy:
      enabled: false
  external_services:
    istio:
      istio_api_enabled: true
    prometheus:
      url: http://prometheus-operated.prometheus.svc.cluster.local:9090
