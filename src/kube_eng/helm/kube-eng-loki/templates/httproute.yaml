{{- if ne .Values.cluster.edge.kind "istio" }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: loki
  labels:
    {{ include "common.labels" . | nindent 4 }}
    app.kubernetes.io/name: loki
spec:
  parentRefs:
  - name: {{ .Values.cluster.edge.gateway.name }}
    namespace: {{ .Values.cluster.edge.gateway.ns }}
    sectionName: {{ .Values.cluster.edge.gateway.section }}  # The HTTPS listener
  hostnames:
  - {{ .Values.cluster.edge.fqdn }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: loki-service
      port: 80
{{- end }}
