{{- if eq .Values.cluster.edge.kind "istio" }}
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: loki-vsvc
  labels:
    {{ include "common.labels" . | nindent 4 }}
    app.kubernetes.io/name: loki-vsvc
spec:
  hosts:
  - {{ .Values.fqdn }}
  gateways:
  - {{ .Values.cluster.edge.ns }}/loki-gw
  http:
  - route:
    - destination:
        host: loki-service.{{ .Release.Namespace }}.svc.cluster.local
        port:
          number: {{ .Values.loki.port | int }}
        subset: main
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: keycloak
  labels:
    {{ include "common.labels" . | nindent 4 }}
    app.kubernetes.io/name: loki
spec:
  host: loki-service.{{ .Release.Namespace }}.svc.cluster.local
  subsets:
  - name: main
    labels:
      app: loki
      version: {{ .Chart.AppVersion }}
{{- end }}
