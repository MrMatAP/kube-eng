apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    {{ include "common.labels" . | nindent 4 }}
    app.kubernetes.io/monitored-by: prometheus
  name: sm-loki-canary
spec:
  jobLabel: app.kubernetes.io/component
  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
      app.kubernetes.io/component: canary
  endpoints:
  - honorLabels: false
    interval: 10s
    scheme: http
    port: http-metrics
    path: /metrics
    relabelings:
    - action: replace
      replacement: ${1}
      sourceLabels:
      - __meta_kubernetes_pod_node_name
      targetLabel: node
