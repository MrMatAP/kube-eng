# Edge Gateway
{{- if eq .Values.cluster.edge.kind "istio-gateway-api" }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
  labels:
    {{ include "common.labels" . | nindent 4 }}
  name: {{ .Values.cluster.edge.name }}
spec:
  gatewayClassName: {{ .Values.gateway.classname }}
  listeners:
  {{ if .Values.stack.tempo.enabled }}
  - name: tempo-grpc
    protocol: HTTPS
    hostname: {{ .Values.stack.tempo.fqdn }}
    port: 4317
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: tempo-grpc-cert
    allowedRoutes:
      namespaces:
        from: All
  - name: tempo-https
    protocol: HTTPS
    hostname: {{ .Values.stack.tempo.fqdn }}
    port: 4318
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: tempo-https-cert
    allowedRoutes:
      namespaces:
        from: All
  {{ end }}
  {{ if .Values.stack.prometheus.enabled }}
  - name: prometheus
    hostname: {{ .Values.stack.prometheus.fqdn }}
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: prometheus-cert
    allowedRoutes:
      namespaces:
        from: All
  {{ end }}
  {{ if .Values.stack.alloy.enabled }}
  - name: alloy
    hostname: {{ .Values.stack.alloy.fqdn }}
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: alloy-cert
    allowedRoutes:
      namespaces:
        from: All
  {{ end }}
  {{ if .Values.stack.grafana.enabled }}
  - name: grafana
    hostname: {{ .Values.stack.grafana.fqdn }}
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: grafana-cert
    allowedRoutes:
      namespaces:
        from: All
  {{ end }}
  {{ if .Values.stack.kiali.enabled }}
  - name: kiali
    hostname: {{ .Values.stack.kiali.fqdn }}
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: kiali-cert
    allowedRoutes:
      namespaces:
        from: All
  {{ end }}
{{ end }}
