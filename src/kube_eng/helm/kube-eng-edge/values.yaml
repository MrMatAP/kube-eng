#
# Default values for Kube Eng :: Edge

cluster:
  name: cluster
  edge:
    kind: ingress
    name: edge
    ingress:
      repository: docker.io/traefik
      tag: v3.6
      fqdn: edge.cluster.k8s

traefik:
  ingressRoute:
    dashboard:
      enabled: true
  healthcheck:
    enabled: true
  gateway:
    enabled: false
  providers:
    kubernetesCRD:
      enabled: false

stack:
  prometheus:
    enabled: false
    fqdn: prometheus.cluster.k8s
  alloy:
    enabled: false
    fqdn: alloy.cluster.k8s
  keycloak:
    enabled: false
    fqdn: keycloak.cluster.k8s
  grafana:
    enabled: false
    fqdn: grafana.cluster.k8s
  jaeger:
    enabled: false
    fqdn: jaeger.cluster.k8s
  kiali:
    enabled: false
    fqdn: kiali.cluster.k8s
