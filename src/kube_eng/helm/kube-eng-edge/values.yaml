#
# Default values for Kube Eng :: Edge

cluster:
  name: cluster
  edge:
    kind: istio-gateway-api
    name: edge

gateway:
  classname: istio

stack:
  prometheus:
    enabled: false
    fqdn: prometheus.cluster.k8s
  alloy:
    enabled: false
    fqdn: alloy.cluster.k8s
  grafana:
    enabled: false
    fqdn: grafana.cluster.k8s
  kiali:
    enabled: false
    fqdn: kiali.cluster.k8s

traefik:
  enabled: false
