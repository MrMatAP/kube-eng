---
- name: Create BIND directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
  loop:
  - "{{ bind_config_path }}"
  - "{{ bind_config_path }}/keys"
  - "{{ bind_config_path }}/logs"
  - "{{ bind_config_path }}/zones"

- name: Template named.conf
  ansible.builtin.template:
    src: templates/named.conf.j2
    dest: "{{ bind_config_path }}/named.conf"

- name: Template the kube-eng zone
  ansible.builtin.template:
    src: templates/db.zone.j2
    dest: "{{ bind_config_path }}/zones/db.{{ cluster_domain }}"

- name: Template the BIND resolver key configuration
  ansible.builtin.template:
    src: templates/resolver.key.j2
    dest: "{{ bind_config_path }}/keys/resolver.key"

- name: Template the BIND launchd.plist
  ansible.builtin.template:
    src: templates/org.mrmat.kubeeng.bind.plist.j2
    dest: "{{ bind_config_path }}/org.mrmat.kubeeng.bind.plist"
